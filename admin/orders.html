<body class="text-[#1A1A1A]">

<!-- SIDEBAR -->

      <span class="tracking-[0.5em] text-[#C9A96E] text-[9px] font-semibold">HOMME · ADMIN</span>
    </div>
  </div>
  <nav class="flex-1 py-4 overflow-y-auto">

    <a href="index.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

    </a>

    <a href="products.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Mahsulotlar
    </a>
    <a href="orders.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>

    </a>
    <a href="categories.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Kategoriyalar
    </a>
    <a href="promo.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Promo Kodlar
    </a>
    <p class="px-6 py-1 text-[9px] tracking-widest uppercase text-gray-400 font-semibold mb-1 mt-3">Tizim</p>
    <a href="settings.html" data-nav class="flex items-center gap-3 px-6 py-3 text-xs font-semibold tracking-wide text-[#6B6B6B] hover:bg-gray-50 hover:text-[#1A1A1A] transition-colors">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Sozlamalar
    </a>
  </nav>
  <div class="border-t border-gray-100 p-4 space-y-2">
    <a href="../index.html" target="_blank" class="flex items-center justify-center gap-2 text-[10px] text-[#6B6B6B] hover:text-[#C9A96E] tracking-widest uppercase transition-colors">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Do'konni Ko'rish
    </a>
    <button onclick="logout()" class="w-full text-[10px] tracking-widest uppercase text-red-500 hover:text-red-700 font-semibold transition-colors py-1">Chiqish</button>
  </div>
</aside>

<!-- MAIN -->
<main class="ml-60 min-h-screen">
  <div class="bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between sticky top-0 z-30">
    <div>
      <h1 class="font-cormorant text-[#1A1A1A] font-normal text-2xl">Buyurtmalar</h1>
      <p id="order-count" class="text-[#6B6B6B] text-[11px]"></p>
    </div>
    <button onclick="addDemoOrder()" class="flex items-center gap-2 border border-gray-200 text-[#6B6B6B] px-4 py-2 text-[11px] font-semibold hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">
      + Demo Buyurtma
    </button>
  </div>

  <div class="p-8">
    <!-- Status tabs -->
    <div class="flex gap-2 mb-5 flex-wrap">
      <button onclick="setStatusFilter('')"         id="tab-all"        class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 bg-[#1A1A1A] text-white transition-colors">Barchasi</button>
      <button onclick="setStatusFilter('pending')"  id="tab-pending"    class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">Kutilmoqda</button>
      <button onclick="setStatusFilter('processing')" id="tab-processing" class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">Jarayonda</button>
      <button onclick="setStatusFilter('shipped')"  id="tab-shipped"    class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">Yuborildi</button>
      <button onclick="setStatusFilter('delivered')" id="tab-delivered"  class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">Yetkazildi</button>
      <button onclick="setStatusFilter('cancelled')" id="tab-cancelled"  class="tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors">Bekor qilindi</button>
    </div>

    <!-- Search -->
    <div class="bg-white border border-gray-100 rounded-lg p-4 mb-5">
      <input id="search" type="text" placeholder="Buyurtma ID, mijoz ismi qidirish..." class="w-full border border-gray-200 px-4 py-2 text-xs outline-none focus:border-[#C9A96E] transition-colors" oninput="renderTable()" />
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-100 rounded-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-[#F9F9F7] border-b border-gray-100">
          <tr>
            <th class="px-5 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Buyurtma</th>
            <th class="px-4 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Mijoz</th>
            <th class="px-4 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Sana</th>
            <th class="px-4 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Jami</th>
            <th class="px-4 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Holat</th>
            <th class="px-4 py-3 text-left text-[10px] tracking-widest uppercase text-[#6B6B6B] font-semibold">Amallar</th>
          </tr>
        </thead>
        <tbody id="orders-tbody" class="divide-y divide-gray-50"></tbody>
      </table>
      <div id="empty-state" class="hidden py-16 text-center">
        <p class="text-[#6B6B6B] text-sm">Buyurtma topilmadi.</p>
      </div>
    </div>
  </div>
</main>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-xl max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 sticky top-0 bg-white z-10">
      <h2 id="modal-order-id" class="font-cormorant text-[#1A1A1A] font-normal text-xl"></h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-[#1A1A1A]">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div id="modal-body" class="p-6"></div>
  </div>
</div>

<script src="assets/admin.js"></script>
<script>
  requireAuth();
  let currentFilter = '';

  function setStatusFilter(s) {
    currentFilter = s;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.className = 'tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A] transition-colors';
    });
    const active = document.getElementById('tab-' + (s || 'all'));
    if (active) active.className = 'tab-btn px-4 py-2 text-[11px] font-semibold tracking-wide border border-[#1A1A1A] bg-[#1A1A1A] text-white transition-colors';
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    let list = getOrders();
    if (currentFilter) list = list.filter(o => o.status === currentFilter);
    if (q) list = list.filter(o => o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) || o.email.toLowerCase().includes(q));
    list = [...list].sort((a, b) => new Date(b.date) - new Date(a.date));

    document.getElementById('order-count').textContent = list.length + ' ta buyurtma';
    const tbody = document.getElementById('orders-tbody');
    const empty = document.getElementById('empty-state');
    if (!list.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');
    tbody.innerHTML = list.map(o => `
      <tr class="hover:bg-gray-50 transition-colors cursor-pointer" onclick="viewOrder('${o.id}')">
        <td class="px-5 py-3.5">
          <p class="text-xs font-semibold text-[#1A1A1A]">${o.id}</p>
          <p class="text-[10px] text-[#6B6B6B]">${o.items.length} ta mahsulot</p>
        </td>
        <td class="px-4 py-3.5">
          <p class="text-xs font-medium text-[#1A1A1A]">${o.customer}</p>
          <p class="text-[10px] text-[#6B6B6B]">${o.phone}</p>
        </td>
        <td class="px-4 py-3.5 text-xs text-[#6B6B6B]">${fmtDate(o.date)}</td>
        <td class="px-4 py-3.5 text-xs font-semibold text-[#1A1A1A]">${fmt(o.total)}</td>
        <td class="px-4 py-3.5">${statusBadge(o.status)}</td>
        <td class="px-4 py-3.5" onclick="event.stopPropagation()">
          <select onchange="updateStatus('${o.id}', this.value)" class="border border-gray-200 px-2 py-1 text-[10px] outline-none focus:border-[#C9A96E] bg-white cursor-pointer rounded">
            ${Object.entries(ORDER_STATUSES).map(([k, v]) => `<option value="${k}" ${o.status===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </td>
      </tr>
    `).join('');
  }

  function updateStatus(id, status) {
    const orders = getOrders();
    const o = orders.find(x => x.id === id);
    if (o) { o.status = status; saveOrders(orders); renderTable(); toast('Holat yangilandi!'); }
  }

  function viewOrder(id) {
    const o = getOrders().find(x => x.id === id);
    const products = getProducts();
    document.getElementById('modal-order-id').textContent = o.id;
    document.getElementById('modal-body').innerHTML = `
      <div class="space-y-5">
        <div class="grid grid-cols-2 gap-4 text-xs">
          <div><p class="text-[#6B6B6B] mb-1">Mijoz</p><p class="font-semibold">${o.customer}</p></div>
          <div><p class="text-[#6B6B6B] mb-1">Telefon</p><p class="font-semibold">${o.phone}</p></div>
          <div><p class="text-[#6B6B6B] mb-1">Email</p><p class="font-semibold">${o.email}</p></div>
          <div><p class="text-[#6B6B6B] mb-1">Sana</p><p class="font-semibold">${fmtDate(o.date)}</p></div>
          <div class="col-span-2"><p class="text-[#6B6B6B] mb-1">Manzil</p><p class="font-semibold">${o.address}</p></div>
        </div>
        <div class="border-t border-gray-100 pt-4">
          <p class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] mb-3">Mahsulotlar</p>
          ${o.items.map(item => {
            const p = products.find(x => x.id === item.productId);
            return p ? `
              <div class="flex items-center gap-3 py-2 border-b border-gray-50">
                <img src="${p.image}" class="w-10 h-12 object-cover bg-[#F5F5F3] rounded flex-shrink-0" />
                <div class="flex-1 min-w-0">
                  <p class="text-xs font-medium truncate">${p.name}</p>
                  <p class="text-[10px] text-[#6B6B6B]">
                    ${item.color ? `<span class="inline-block w-3 h-3 rounded-full mr-1 align-middle border border-gray-200" style="background:${item.color}"></span>` : ''}
                    ${item.size ? item.size : ''} · ${item.qty} ta
                  </p>
                </div>
                <p class="text-xs font-semibold flex-shrink-0">${fmt(p.price * item.qty)}</p>
              </div>
            ` : '';
          }).join('')}
        </div>
        <div class="flex justify-between items-center pt-3">
          <span class="text-xs font-semibold tracking-widest uppercase">Umumiy</span>
          <span class="font-cormorant text-[#1A1A1A] font-normal text-xl">${fmt(o.total)}</span>
        </div>
        <div class="pt-3 border-t border-gray-100">
          <p class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] mb-2">Holat o'zgartirish</p>
          <div class="flex flex-wrap gap-2">
            ${Object.entries(ORDER_STATUSES).map(([k, v]) => `
              <button onclick="updateStatus('${o.id}','${k}');closeModal();" class="px-3 py-1.5 text-[10px] font-semibold rounded border ${o.status===k?'border-[#1A1A1A] bg-[#1A1A1A] text-white':'border-gray-200 text-[#6B6B6B] hover:border-[#1A1A1A] hover:text-[#1A1A1A]'} transition-colors">${v.label}</button>
            `).join('')}
          </div>
        </div>
      </div>`;
    document.getElementById('order-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('order-modal').classList.remove('open'); }
  document.getElementById('order-modal').addEventListener('click', e => { if (e.target === document.getElementById('order-modal')) closeModal(); });

  function addDemoOrder() {
    const products = getProducts();
    const names = ['Alisher Qodirov','Barno Mirzayeva','Jasurbek Toshev','Kamola Xoliqova','Nodir Rahimov'];
    const statuses = ['pending','processing'];
    const p1 = products[Math.floor(Math.random()*products.length)];
    const p2 = products[Math.floor(Math.random()*products.length)];
    const orders = getOrders();
    const newOrder = {
      id: 'ORD-' + String(orders.length + 100).padStart(3,'0'),
      customer: names[Math.floor(Math.random()*names.length)],
      email: 'demo@example.com',
      phone: '+998 90 ' + Math.floor(1000000+Math.random()*9000000),
      items: [{productId:p1.id,qty:1,color:p1.colors?.[0]||'',size:'M'}],
      total: p1.price,
      status: statuses[Math.floor(Math.random()*statuses.length)],
      date: new Date().toISOString().split('T')[0],
      address: 'Toshkent, Test ko\'chasi, 1-uy',
    };
    orders.push(newOrder);
    saveOrders(orders);
    renderTable();
    toast('Demo buyurtma qo\'shildi!');
  }

  renderTable();
</script>
</body>
</html>
