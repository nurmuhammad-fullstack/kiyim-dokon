<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilim — Novus Homme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{cormorant:["'Cormorant Garamond'","serif"]}}}}</script>
  <style>
    .font-cormorant{font-family:'Cormorant Garamond',serif;}
    .status-pending    {background:#FEF3C7;color:#92400E;}
    .status-processing {background:#DBEAFE;color:#1E40AF;}
    .status-shipped    {background:#E0E7FF;color:#3730A3;}
    .status-delivered  {background:#D1FAE5;color:#065F46;}
    .status-cancelled  {background:#FEE2E2;color:#991B1B;}
  </style>
</head>
<body class="bg-[#F5F5F3] text-[#1A1A1A]">

<!-- HEADER -->
<header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-20">
      <a href="index.html" class="flex flex-col leading-none">
        <span class="font-cormorant tracking-[0.3em] text-[#1A1A1A] uppercase text-[22px] font-medium">NOVUS</span>
        <span class="tracking-[0.4em] text-[#C9A96E] text-[9px] font-medium">HOMME</span>
      </a>
      <nav class="hidden lg:flex items-center gap-8">
        <a href="index.html" class="text-xs tracking-widest uppercase text-[#1A1A1A] hover:text-[#C9A96E] transition-colors font-medium">Bosh sahifa</a>
        <a href="category.html" class="text-xs tracking-widest uppercase text-[#1A1A1A] hover:text-[#C9A96E] transition-colors font-medium">Kolleksiyalar</a>
      </nav>
      <div class="flex items-center gap-5">
        <a href="cart.html" class="relative text-[#1A1A1A] hover:text-[#C9A96E] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <button onclick="logout()" class="text-xs tracking-widest uppercase text-[#6B6B6B] hover:text-red-500 transition-colors font-medium">Chiqish</button>
      </div>
    </div>
  </div>
</header>

<div class="pt-20 lg:pt-24 pb-16">
  <div class="max-w-4xl mx-auto px-6 lg:px-8">

    <!-- Page header -->
    <div class="mb-8">
      <p class="text-[#C9A96E] tracking-[0.35em] uppercase text-[10px] font-semibold mb-1">Shaxsiy kabinet</p>
      <h1 class="font-cormorant text-[#1A1A1A] font-normal" style="font-size:clamp(28px,4vw,42px)">
        Salom, <span id="user-name">...</span>
      </h1>
    </div>

    <div class="grid lg:grid-cols-[280px_1fr] gap-8">

      <!-- LEFT: Info card -->
      <div class="space-y-4">
        <div class="bg-white p-6 shadow-sm">
          <h3 class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] mb-4">Ma'lumotlarim</h3>
          <div class="space-y-3">
            <div>
              <p class="text-[10px] text-[#6B6B6B] uppercase tracking-wider mb-0.5">Ism</p>
              <p id="info-name" class="text-sm font-medium text-[#1A1A1A]">—</p>
            </div>
            <div>
              <p class="text-[10px] text-[#6B6B6B] uppercase tracking-wider mb-0.5">Email</p>
              <p id="info-email" class="text-sm font-medium text-[#1A1A1A]">—</p>
            </div>
            <div>
              <p class="text-[10px] text-[#6B6B6B] uppercase tracking-wider mb-0.5">Telefon</p>
              <p id="info-phone" class="text-sm font-medium text-[#1A1A1A]">—</p>
            </div>
          </div>
        </div>

        <div class="bg-white p-6 shadow-sm">
          <h3 class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] mb-4">Tez havolalar</h3>
          <div class="space-y-2">
            <a href="category.html" class="flex items-center gap-2 text-sm text-[#1A1A1A] hover:text-[#C9A96E] transition-colors py-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              Xarid qilish
            </a>
            <a href="cart.html" class="flex items-center gap-2 text-sm text-[#1A1A1A] hover:text-[#C9A96E] transition-colors py-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
              Savat
            </a>
            <button onclick="logout()" class="flex items-center gap-2 text-sm text-red-400 hover:text-red-600 transition-colors py-1 w-full text-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
              Chiqish
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Orders -->
      <div class="bg-white shadow-sm">
        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
          <h2 class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B]">Buyurtmalarim</h2>
          <span id="orders-count" class="text-[#C9A96E] text-xs font-medium"></span>
        </div>

        <div id="orders-loading" class="p-8 text-center">
          <div class="w-6 h-6 border-2 border-[#C9A96E] border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>

        <div id="orders-empty" class="hidden p-10 text-center">
          <svg class="mx-auto mb-4 text-gray-200" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <p class="text-[#6B6B6B] text-sm mb-4">Hali buyurtma yo'q</p>
          <a href="category.html" class="inline-block bg-[#1A1A1A] text-white px-8 py-3 tracking-widest uppercase text-[10px] font-semibold hover:bg-[#333] transition-all">
            Xarid boshlash
          </a>
        </div>

        <div id="orders-list" class="hidden divide-y divide-gray-100"></div>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  const statusLabel = {
    pending:    'Kutilmoqda',
    processing: 'Tayyorlanmoqda',
    shipped:    'Yo\'lda',
    delivered:  'Yetkazildi',
    cancelled:  'Bekor qilindi',
  };

  function fmt(n) { return new Intl.NumberFormat('uz-UZ').format(n) + ' UZS'; }
  function fmtDate(d) { return new Date(d).toLocaleDateString('uz-UZ', { year:'numeric', month:'long', day:'numeric' }); }

  function logout() {
    apiUser.logout();
    window.location.href = 'login.html';
  }

  async function init() {
    if (!isUserLoggedIn()) { window.location.href = 'login.html'; return; }

    // User ma'lumotlari (localStorage dan tez)
    const cached = getUser();
    if (cached) {
      document.getElementById('user-name').textContent = cached.name;
      document.getElementById('info-name').textContent = cached.name;
      document.getElementById('info-email').textContent = cached.email;
      document.getElementById('info-phone').textContent = cached.phone || '—';
    }

    // Buyurtmalar
    try {
      const orders = await apiUser.myOrders();
      document.getElementById('orders-loading').classList.add('hidden');
      document.getElementById('orders-count').textContent = orders.length + ' ta buyurtma';

      if (!orders.length) {
        document.getElementById('orders-empty').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('orders-list');
      list.classList.remove('hidden');
      list.innerHTML = orders.map(o => `
        <div class="p-5">
          <div class="flex items-start justify-between gap-4 mb-3">
            <div>
              <p class="text-[10px] text-[#6B6B6B] uppercase tracking-wider mb-0.5">Buyurtma #${o.id.slice(-6).toUpperCase()}</p>
              <p class="text-xs text-[#6B6B6B]">${fmtDate(o.createdAt)}</p>
            </div>
            <span class="px-2.5 py-1 text-[10px] font-semibold rounded tracking-wide status-${o.status}">
              ${statusLabel[o.status] || o.status}
            </span>
          </div>
          <div class="space-y-1.5 mb-3">
            ${o.items.map(i => `
              <div class="flex justify-between text-xs">
                <span class="text-[#1A1A1A]">${i.product?.name || 'Mahsulot'} × ${i.qty}</span>
                <span class="text-[#6B6B6B]">${fmt(i.price * i.qty)}</span>
              </div>
            `).join('')}
          </div>
          <div class="flex justify-between items-center pt-3 border-t border-gray-100">
            <span class="text-[10px] uppercase tracking-widest text-[#6B6B6B] font-semibold">Jami</span>
            <span class="font-cormorant text-[#1A1A1A] font-medium text-lg">${fmt(o.total)}</span>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('orders-loading').innerHTML =
        '<p class="text-red-400 text-sm p-8 text-center">' + (err.message || 'Xato') + '</p>';
    }
  }

  init();
</script>
</body>
</html>
