<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish — Novus Homme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{cormorant:["'Cormorant Garamond'","serif"]}}}}</script>
  <style>.font-cormorant{font-family:'Cormorant Garamond',serif;}</style>
</head>
<body class="bg-[#F5F5F3] min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-white border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html" class="flex flex-col leading-none">
      <span class="font-cormorant tracking-[0.3em] text-[#1A1A1A] uppercase text-[22px] font-medium">NOVUS</span>
      <span class="tracking-[0.4em] text-[#C9A96E] text-[9px] font-medium">HOMME</span>
    </a>
    <a href="index.html" class="text-xs tracking-widest uppercase text-[#6B6B6B] hover:text-[#1A1A1A] transition-colors">← Bosh sahifa</a>
  </div>
</header>

<div class="flex-1 flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white shadow-sm p-8 md:p-10">
      <div class="text-center mb-8">
        <h1 class="font-cormorant text-[#1A1A1A] font-normal text-4xl mb-2">Kirish</h1>
        <p class="text-[#6B6B6B] text-sm">Hisobingizga kiring</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Email *</label>
          <input id="email" type="email" required autocomplete="email" placeholder="email@example.com"
            class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white" />
        </div>
        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Parol *</label>
          <div class="relative">
            <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••"
              class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white pr-11" />
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#1A1A1A]">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <p id="error-msg" class="text-red-500 text-xs hidden"></p>

        <button type="submit" id="submit-btn"
          class="w-full bg-[#1A1A1A] text-white py-4 tracking-widest uppercase text-[11px] font-semibold hover:bg-[#333] transition-all flex items-center justify-center gap-2">
          Kirish
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-[#6B6B6B]">
          Hisobingiz yo'qmi?
          <a href="register.html" class="text-[#C9A96E] hover:underline font-medium">Ro'yxatdan o'tish</a>
        </p>
      </div>
    </div>

    <!-- Divider -->
    <p class="text-center text-[10px] tracking-widest uppercase text-[#6B6B6B] mt-6">
      Xavfsiz 256-bit shifrlash bilan himoyalangan
    </p>
  </div>
</div>

<script src="api.js"></script>
<script>
  // Agar allaqachon login qilgan bo'lsa
  if (isUserLoggedIn()) window.location.href = 'profile.html';

  function togglePassword() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('submit-btn');

    errEl.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Kirilmoqda...';

    try {
      await apiUser.login(email, password);
      const next = new URLSearchParams(location.search).get('next') || 'index.html';
      window.location.href = next;
    } catch (err) {
      errEl.textContent = err.message || 'Xato yuz berdi';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Kirish';
    }
  });
</script>
</body>
</html>
