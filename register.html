<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ro'yxatdan o'tish — Novus Homme</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{cormorant:["'Cormorant Garamond'","serif"]}}}}</script>
  <style>.font-cormorant{font-family:'Cormorant Garamond',serif;}</style>
</head>
<body class="bg-[#F5F5F3] min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-white border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html" class="flex flex-col leading-none">
      <span class="font-cormorant tracking-[0.3em] text-[#1A1A1A] uppercase text-[22px] font-medium">NOVUS</span>
      <span class="tracking-[0.4em] text-[#C9A96E] text-[9px] font-medium">HOMME</span>
    </a>
    <a href="index.html" class="text-xs tracking-widest uppercase text-[#6B6B6B] hover:text-[#1A1A1A] transition-colors">← Bosh sahifa</a>
  </div>
</header>

<div class="flex-1 flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="bg-white shadow-sm p-8 md:p-10">
      <div class="text-center mb-8">
        <h1 class="font-cormorant text-[#1A1A1A] font-normal text-4xl mb-2">Ro'yxatdan o'tish</h1>
        <p class="text-[#6B6B6B] text-sm">Novus Homme oilasiga qo'shiling</p>
      </div>

      <form id="register-form" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Ism *</label>
            <input id="name" type="text" required autocomplete="given-name" placeholder="Ismingiz"
              class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white" />
          </div>
          <div>
            <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Familiya</label>
            <input id="surname" type="text" autocomplete="family-name" placeholder="Familiyangiz"
              class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white" />
          </div>
        </div>

        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Email *</label>
          <input id="email" type="email" required autocomplete="email" placeholder="email@example.com"
            class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white" />
        </div>

        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Telefon</label>
          <input id="phone" type="tel" autocomplete="tel" placeholder="+998 90 123 45 67"
            class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white" />
        </div>

        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Parol *</label>
          <div class="relative">
            <input id="password" type="password" required autocomplete="new-password" placeholder="Kamida 6 ta belgi"
              class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white pr-11" />
            <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#1A1A1A]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <!-- Password strength -->
          <div id="strength-bar" class="mt-2 flex gap-1 hidden">
            <div class="h-1 flex-1 rounded transition-colors" id="s1"></div>
            <div class="h-1 flex-1 rounded transition-colors" id="s2"></div>
            <div class="h-1 flex-1 rounded transition-colors" id="s3"></div>
            <div class="h-1 flex-1 rounded transition-colors" id="s4"></div>
          </div>
          <p id="strength-label" class="text-[10px] text-[#6B6B6B] mt-1 hidden"></p>
        </div>

        <div>
          <label class="text-[10px] tracking-widest uppercase font-semibold text-[#6B6B6B] block mb-1.5">Parolni tasdiqlang *</label>
          <div class="relative">
            <input id="password2" type="password" required autocomplete="new-password" placeholder="Parolni qayta kiriting"
              class="w-full border border-gray-200 px-4 py-3 text-sm outline-none focus:border-[#C9A96E] transition-colors bg-white pr-11" />
            <button type="button" onclick="togglePassword('password2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#1A1A1A]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <p id="error-msg" class="text-red-500 text-xs hidden"></p>

        <button type="submit" id="submit-btn"
          class="w-full bg-[#1A1A1A] text-white py-4 tracking-widest uppercase text-[11px] font-semibold hover:bg-[#333] transition-all">
          Ro'yxatdan o'tish
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-100 text-center">
        <p class="text-sm text-[#6B6B6B]">
          Hisobingiz bormi?
          <a href="login.html" class="text-[#C9A96E] hover:underline font-medium">Kirish</a>
        </p>
      </div>
    </div>

    <p class="text-center text-[10px] tracking-widest uppercase text-[#6B6B6B] mt-6">
      Xavfsiz 256-bit shifrlash bilan himoyalangan
    </p>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (isUserLoggedIn()) window.location.href = 'profile.html';

  function togglePassword(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // Password strength
  document.getElementById('password').addEventListener('input', function() {
    const val = this.value;
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    if (!val) { bar.classList.add('hidden'); label.classList.add('hidden'); return; }
    bar.classList.remove('hidden'); label.classList.remove('hidden');

    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-500'];
    const labels = ['Juda zaif','Zaif','O\'rtacha','Kuchli'];
    for (let i = 1; i <= 4; i++) {
      const el = document.getElementById('s' + i);
      el.className = 'h-1 flex-1 rounded transition-colors ' + (i <= score ? colors[score - 1] : 'bg-gray-200');
    }
    label.textContent = labels[score - 1] || '';
    label.className = 'text-[10px] mt-1 ' + ['text-red-400','text-orange-400','text-yellow-500','text-green-600'][score - 1];
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const name     = (document.getElementById('name').value.trim() + ' ' + document.getElementById('surname').value.trim()).trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('submit-btn');

    errEl.classList.add('hidden');

    if (password !== password2) {
      errEl.textContent = 'Parollar mos kelmadi';
      errEl.classList.remove('hidden');
      return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Parol kamida 6 ta belgi bo\'lishi kerak';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ro\'yxatdan o\'tilmoqda...';

    try {
      await apiUser.register(name, email, password, phone || undefined);
      window.location.href = 'profile.html';
    } catch (err) {
      errEl.textContent = err.message || 'Xato yuz berdi';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Ro\'yxatdan o\'tish';
    }
  });
</script>
</body>
</html>
